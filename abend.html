<!DOCTYPE html>
<html class="light" lang="de">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Abend-Flow — Lebensfunken</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed-dim": "#f0bd8b", "on-primary-fixed-variant": "#364c3c", "secondary-fixed": "#ffdcc4", "tertiary-fixed": "#ffdcbd", "tertiary": "#261200", "secondary": "#924c00", "on-tertiary-container": "#b7895b", "surface-container-lowest": "#ffffff", "on-tertiary-fixed-variant": "#623f18", "inverse-surface": "#30312e", "primary-fixed": "#d0e9d4", "secondary-fixed-dim": "#ffb781", "secondary-container": "#fda055", "primary": "#061b0e", "primary-container": "#1b3022", "surface-variant": "#e4e2dd", "on-secondary-fixed-variant": "#6f3800", "surface-dim": "#dbdad5", "on-primary": "#ffffff", "on-primary-fixed": "#0b2013", "inverse-on-surface": "#f2f1ec", "error": "#ba1a1a", "tertiary-container": "#422401", "inverse-primary": "#b4cdb8", "on-secondary-fixed": "#2f1400", "outline": "#737973", "surface-container-highest": "#e4e2dd", "error-container": "#ffdad6", "on-error-container": "#93000a", "on-background": "#1b1c19", "on-primary-container": "#819986", "surface-bright": "#fbf9f4", "surface-tint": "#4d6453", "on-surface-variant": "#434843", "on-tertiary": "#ffffff", "surface-container-low": "#f5f3ee", "primary-fixed-dim": "#b4cdb8", "on-secondary": "#ffffff", "surface": "#fbf9f4", "on-secondary-container": "#703800", "background": "#fbf9f4", "surface-container-high": "#eae8e3", "surface-container": "#f0eee9", "on-error": "#ffffff", "outline-variant": "#c3c8c1", "on-surface": "#1b1c19", "on-tertiary-fixed": "#2c1600"
            },
            "borderRadius": {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
            "fontFamily": {"headline": ["Noto Serif"], "body": ["Inter"], "label": ["Inter"]}
          },
        },
      }
    </script>
<style>
body { background-color: #FBF9F4; }
.film-grain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; opacity: 0.02; background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
.fadein { animation: fadein .3s ease-out; }
@keyframes fadein { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.star-btn { transition: transform .15s; }
.star-btn:hover { transform: scale(1.2); }
</style>
</head>
<body class="font-body text-on-background selection:bg-on-tertiary-container/20">
<div class="film-grain"></div>
<main class="min-h-screen w-full flex flex-col p-6 md:p-12 relative">
  <header class="w-full max-w-screen-2xl mx-auto flex justify-between items-start opacity-70 mb-8">
    <div class="flex flex-col">
      <span class="font-label text-[10px] uppercase tracking-[0.2em] text-secondary mb-1" id="themeLabel">Abend-Flow</span>
      <a href="index.html" class="font-headline italic text-xl text-primary-container">Lebensfunken</a>
    </div>
    <div class="flex items-center gap-6">
      <div class="text-right hidden md:block">
        <span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant/60 block">Timer</span>
        <span id="timer" class="font-headline text-3xl font-light tracking-tight text-primary-container tabular-nums">00:00</span>
      </div>
      <a id="closeLink" href="thema.html" class="p-2 hover:bg-surface-container transition-colors rounded-lg">
        <span class="material-symbols-outlined text-on-surface-variant">close</span>
      </a>
    </div>
  </header>

  <section class="flex-1 w-full max-w-4xl mx-auto flex flex-col items-center py-8">
    <div class="mb-8 text-center">
      <p id="phaseLabel" class="font-label text-xs uppercase tracking-widest text-on-tertiary-container mb-3">—</p>
      <div id="progressBar" class="flex items-center gap-2 justify-center"></div>
    </div>

    <div class="md:hidden mb-6 text-center">
      <span id="timerMobile" class="font-headline text-5xl font-light tracking-tight text-primary-container tabular-nums">00:00</span>
    </div>

    <h1 id="phaseTitle" class="font-headline text-3xl md:text-5xl text-primary-container leading-tight tracking-tight mb-8 text-center fadein">—</h1>

    <div id="hostNoteBox" class="mb-6 max-w-2xl w-full hidden">
      <div class="flex items-start gap-3 bg-surface-container-low rounded-lg p-4 border-l-2 border-secondary/40">
        <span class="material-symbols-outlined text-secondary/70 mt-0.5 text-lg">record_voice_over</span>
        <p id="hostNote" class="text-sm text-on-surface-variant leading-relaxed italic"></p>
      </div>
    </div>

    <div id="descriptionBox" class="mb-8 max-w-2xl w-full hidden">
      <p id="description" class="text-lg md:text-xl font-light text-on-background/80 leading-relaxed whitespace-pre-line"></p>
    </div>

    <div id="questionBox" class="mb-10 max-w-2xl w-full hidden">
      <p id="question" class="text-xl md:text-3xl font-headline italic text-primary-container text-center leading-snug"></p>
    </div>

    <div id="itemsBox" class="mb-10 w-full max-w-5xl hidden">
      <div id="itemsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>

    <!-- Feedback form (rendered for feedback-type stations) -->
    <form id="feedbackForm" class="hidden w-full max-w-2xl space-y-6 bg-surface-container-low rounded-xl p-6 md:p-8 fadein" onsubmit="submitFeedback(event)">
      <div>
        <label class="font-label text-xs uppercase tracking-widest text-on-tertiary-container block mb-3">Wie war der Abend?</label>
        <div class="flex gap-2 justify-center md:justify-start" role="radiogroup">
          <!-- Stars are injected via JS so they use Material Symbols -->
        </div>
      </div>
      <div>
        <label for="fbMoved" class="font-label text-xs uppercase tracking-widest text-on-tertiary-container block mb-2">Was hat dich bewegt?</label>
        <textarea id="fbMoved" rows="3" class="w-full bg-surface-container-lowest border border-outline-variant/30 rounded-lg p-3 text-sm focus:outline-none focus:border-secondary transition-colors" placeholder="Ein Moment, eine Frage, ein Satz …"></textarea>
      </div>
      <div>
        <label for="fbImprove" class="font-label text-xs uppercase tracking-widest text-on-tertiary-container block mb-2">Was könnte besser sein?</label>
        <textarea id="fbImprove" rows="3" class="w-full bg-surface-container-lowest border border-outline-variant/30 rounded-lg p-3 text-sm focus:outline-none focus:border-secondary transition-colors" placeholder="Direkt, ehrlich, gern konkret."></textarea>
      </div>
      <div>
        <label for="fbEmail" class="font-label text-xs uppercase tracking-widest text-on-tertiary-container block mb-2">Deine E-Mail (optional)</label>
        <input id="fbEmail" type="email" placeholder="name@beispiel.de" class="w-full bg-surface-container-lowest border border-outline-variant/30 rounded-lg p-3 text-sm focus:outline-none focus:border-secondary transition-colors"/>
        <p class="text-xs text-on-surface-variant/60 mt-1 italic">Nur, falls du zu neuen Themen informiert werden willst.</p>
      </div>
      <button type="submit" class="w-full md:w-auto bg-primary-container text-on-primary px-8 py-4 rounded-lg font-label text-sm uppercase tracking-[0.15em] hover:bg-primary transition-colors active:scale-[0.98]">
        Feedback senden
      </button>
      <p class="text-xs text-on-surface-variant/60 italic">Dein Feedback wird per E-Mail geschickt — dein Mail-Programm öffnet sich mit einer vorbereiteten Nachricht.</p>
    </form>
  </section>

  <footer id="mainFooter" class="w-full max-w-screen-2xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6 pt-8 border-t border-outline-variant/20">
    <button id="prevBtn" class="flex items-center gap-3 text-on-surface-variant hover:text-secondary transition-colors disabled:opacity-30 disabled:cursor-not-allowed order-2 md:order-1" disabled>
      <span class="material-symbols-outlined text-base">arrow_back</span>
      <span class="font-label text-xs uppercase tracking-widest">Zurück</span>
    </button>
    <div class="flex items-center gap-6 md:gap-8 order-1 md:order-2">
      <button id="toggleTimerBtn" class="group flex items-center gap-3 text-on-surface-variant hover:text-secondary transition-colors">
        <span id="toggleTimerIcon" class="material-symbols-outlined text-lg">pause</span>
        <span id="toggleTimerLabel" class="font-label text-xs uppercase tracking-widest hidden md:inline">Timer pausieren</span>
      </button>
      <button id="nextBtn" class="bg-primary-container text-on-primary px-8 md:px-10 py-4 md:py-5 rounded-lg font-label text-xs md:text-sm uppercase tracking-[0.15em] flex items-center gap-3 md:gap-4 hover:bg-primary transition-all active:scale-[0.98]">
        <span id="nextBtnLabel">Weiter</span>
        <span class="material-symbols-outlined text-base">arrow_forward</span>
      </button>
    </div>
    <div class="hidden md:block order-3 w-24"></div>
  </footer>

  <div class="absolute bottom-0 left-0 p-12 opacity-10 pointer-events-none hidden md:block">
    <div class="w-64 h-64 border-l border-b border-primary-container rounded-bl-xl"></div>
  </div>
</main>
<script src="themes.js"></script>
<script>
const params = new URLSearchParams(location.search);
const themaId = params.get('thema') || 'bindung';
const formatKey = params.get('format') || 'group';
const theme = window.THEMES[themaId] || window.THEMES.bindung;
const format = theme.formats[formatKey] || theme.formats.group;
const stations = format.stations;

let currentIdx = 0;
let timeLeft = stations[0].duration;
let timerInterval = null;
let paused = false;
let rating = 0;

const el = {
  themeLabel: document.getElementById('themeLabel'),
  phaseLabel: document.getElementById('phaseLabel'),
  progressBar: document.getElementById('progressBar'),
  phaseTitle: document.getElementById('phaseTitle'),
  hostNoteBox: document.getElementById('hostNoteBox'),
  hostNote: document.getElementById('hostNote'),
  descriptionBox: document.getElementById('descriptionBox'),
  description: document.getElementById('description'),
  questionBox: document.getElementById('questionBox'),
  question: document.getElementById('question'),
  itemsBox: document.getElementById('itemsBox'),
  itemsGrid: document.getElementById('itemsGrid'),
  feedbackForm: document.getElementById('feedbackForm'),
  timer: document.getElementById('timer'),
  timerMobile: document.getElementById('timerMobile'),
  prevBtn: document.getElementById('prevBtn'),
  nextBtn: document.getElementById('nextBtn'),
  nextBtnLabel: document.getElementById('nextBtnLabel'),
  toggleTimerBtn: document.getElementById('toggleTimerBtn'),
  toggleTimerIcon: document.getElementById('toggleTimerIcon'),
  toggleTimerLabel: document.getElementById('toggleTimerLabel'),
  closeLink: document.getElementById('closeLink')
};

el.closeLink.href = 'thema.html?id=' + encodeURIComponent(themaId);
el.themeLabel.textContent = theme.title + ' · ' + format.label;
document.title = theme.title + ' — Lebensfunken';

// Build star buttons once
const starRow = el.feedbackForm.querySelector('[role="radiogroup"]');
for (let i = 1; i <= 5; i++) {
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.setAttribute('role', 'radio');
  btn.setAttribute('aria-label', i + ' Sterne');
  btn.className = 'star-btn text-3xl text-on-surface-variant/40 hover:text-secondary transition-colors';
  btn.innerHTML = '<span class="material-symbols-outlined">star</span>';
  btn.dataset.rating = i;
  btn.addEventListener('click', () => {
    rating = i;
    [...starRow.children].forEach((s, idx) => {
      s.querySelector('span').style.fontVariationSettings = (idx < i) ? "'FILL' 1" : "'FILL' 0";
      s.classList.toggle('text-secondary', idx < i);
      s.classList.toggle('text-on-surface-variant/40', idx >= i);
    });
  });
  starRow.appendChild(btn);
}

function submitFeedback(ev) {
  ev.preventDefault();
  const moved = document.getElementById('fbMoved').value.trim();
  const improve = document.getElementById('fbImprove').value.trim();
  const email = document.getElementById('fbEmail').value.trim();
  const subject = `Lebensfunken Feedback — ${theme.title} (${format.label})`;
  const body = [
    `Thema: ${theme.title}`,
    `Format: ${format.label}`,
    `Bewertung: ${rating ? rating + ' / 5 Sterne' : 'keine Angabe'}`,
    '',
    'Was bewegt hat:',
    moved || '—',
    '',
    'Was besser sein könnte:',
    improve || '—',
    '',
    email ? `Kontakt: ${email}` : 'Kontakt: anonym',
  ].join('\n');
  const mailto = `mailto:${encodeURIComponent(window.LEBENSFUNKEN_FEEDBACK_EMAIL)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  window.location.href = mailto;
  // Nach 1 s zurück zur Start-Seite, damit der Abend sauber endet
  setTimeout(() => { window.location.href = 'thema.html?id=' + encodeURIComponent(themaId); }, 1200);
}

function formatTime(s) {
  const m = String(Math.floor(s / 60)).padStart(2, '0');
  const sec = String(s % 60).padStart(2, '0');
  return m + ':' + sec;
}
function setTimerText(t) { el.timer.textContent = t; el.timerMobile.textContent = t; }

function renderProgress() {
  el.progressBar.innerHTML = stations.map((_, i) => {
    const cls = i <= currentIdx ? 'bg-primary-container' : 'bg-surface-container-highest';
    const w = i === currentIdx ? 'w-12' : 'w-6';
    return `<div class="h-[2px] ${w} ${cls}"></div>`;
  }).join('');
}

function renderItems(items) {
  return items.map(it => `
    <div class="bg-surface-container-low rounded-lg p-5 border border-outline-variant/20 hover:border-secondary/40 transition-colors">
      <div class="flex items-baseline justify-between gap-3 mb-2">
        <h3 class="font-headline text-xl text-primary-container">${it.label || ''}</h3>
        ${it.accent ? `<span class="font-label text-[10px] uppercase tracking-widest text-secondary shrink-0">${it.accent}</span>` : ''}
      </div>
      <p class="text-sm text-on-surface-variant leading-relaxed">${it.text || ''}</p>
    </div>
  `).join('');
}

function hideAllContentBoxes() {
  el.hostNoteBox.classList.add('hidden');
  el.descriptionBox.classList.add('hidden');
  el.questionBox.classList.add('hidden');
  el.itemsBox.classList.add('hidden');
  el.feedbackForm.classList.add('hidden');
}

function render() {
  const s = stations[currentIdx];
  timeLeft = s.duration;
  hideAllContentBoxes();

  el.phaseLabel.textContent = `Station ${currentIdx + 1} von ${stations.length} · ${s.name}`;
  el.phaseTitle.textContent = s.title;
  el.phaseTitle.classList.remove('fadein');
  void el.phaseTitle.offsetWidth;
  el.phaseTitle.classList.add('fadein');

  if (s.type === 'feedback') {
    // Feedback-Station: nur Formular zeigen, kein Timer runterzählen
    el.description.textContent = s.description || '';
    el.descriptionBox.classList.toggle('hidden', !s.description);
    el.feedbackForm.classList.remove('hidden');
  } else {
    if (s.hostNote) { el.hostNote.textContent = s.hostNote; el.hostNoteBox.classList.remove('hidden'); }
    if (s.description) { el.description.textContent = s.description; el.descriptionBox.classList.remove('hidden'); }
    if (s.question) { el.question.textContent = s.question; el.questionBox.classList.remove('hidden'); }
    if (s.items && s.items.length) {
      el.itemsGrid.innerHTML = renderItems(s.items);
      el.itemsBox.classList.remove('hidden');
    }
  }

  setTimerText(formatTime(timeLeft));
  el.prevBtn.disabled = currentIdx === 0;

  if (s.type === 'feedback') {
    el.nextBtnLabel.textContent = 'Überspringen & beenden';
  } else if (currentIdx === stations.length - 1) {
    el.nextBtnLabel.textContent = 'Abend beenden';
  } else if (currentIdx === stations.length - 2 && stations[stations.length - 1].type === 'feedback') {
    el.nextBtnLabel.textContent = 'Zum Feedback';
  } else {
    el.nextBtnLabel.textContent = 'Weiter';
  }

  renderProgress();
  startTimer();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  paused = false;
  el.toggleTimerIcon.textContent = 'pause';
  el.toggleTimerLabel.textContent = 'Timer pausieren';
  timerInterval = setInterval(() => {
    if (paused) return;
    if (timeLeft <= 0) { clearInterval(timerInterval); return; }
    timeLeft--;
    setTimerText(formatTime(timeLeft));
  }, 1000);
}

el.prevBtn.addEventListener('click', () => {
  if (currentIdx > 0) { currentIdx--; render(); }
});
el.nextBtn.addEventListener('click', () => {
  if (currentIdx < stations.length - 1) {
    currentIdx++;
    render();
  } else {
    window.location.href = 'thema.html?id=' + encodeURIComponent(themaId);
  }
});
el.toggleTimerBtn.addEventListener('click', () => {
  paused = !paused;
  el.toggleTimerIcon.textContent = paused ? 'play_arrow' : 'pause';
  el.toggleTimerLabel.textContent = paused ? 'Timer fortsetzen' : 'Timer pausieren';
});

render();
</script>
</body>
</html>
