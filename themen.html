    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},

    <a href="index.html" class="font-serif italic text-2xl text-primary">KlarKreis</a>
    <nav class="hidden md:flex space-x-12">
      <a class="font-['Noto_Serif'] tracking-tight leading-relaxed text-[#1B1C19]/60 hover:text-[#B7895B] transition-colors duration-300" href="index.html">Start</a>
      <a class="font-['Noto_Serif'] tracking-tight leading-relaxed text-on-background font-bold border-b border-secondary" href="themen.html">Themen</a>
      <a class="font-['Noto_Serif'] tracking-tight leading-relaxed text-[#1B1C19]/60 hover:text-[#B7895B] transition-colors duration-300" href="funken.html">Funken</a>

<main class="p-8 md:p-16 max-w-7xl mx-auto">
  <header class="mb-12">
    <p class="font-['Inter'] uppercase tracking-[0.2em] text-[11px] text-secondary mb-4">Die Sammlung</p>
    <h1 class="font-serif text-5xl md:text-7xl leading-tight tracking-tight text-on-background max-w-2xl">Themen-Übersicht</h1>
    <div class="mt-8 flex flex-wrap gap-4 items-center">
      <p class="text-on-surface-variant font-light italic mr-4">Vorbereitete Abende für tiefe Gespräche — zu zweit oder in kleiner Runde.</p>
    </div>
  </header>

  <!-- Format filter -->
  <section class="mb-16 flex flex-wrap gap-3 items-center">
    <span class="font-label uppercase tracking-widest text-[10px] text-on-surface-variant mr-2">Für welches Format:</span>
    <button data-filter="all" class="format-filter px-5 py-2.5 rounded-lg border border-outline-variant/30 bg-surface-container-low hover:border-secondary/50 transition-colors flex items-center gap-2">
      <span class="font-label text-[11px] uppercase tracking-widest">Alle Formate</span>
    </button>
    <button data-filter="pair" class="format-filter px-5 py-2.5 rounded-lg border border-outline-variant/30 bg-surface-container-low hover:border-secondary/50 transition-colors flex items-center gap-2">
      <span class="material-symbols-outlined text-base">handshake</span>
      <span class="font-label text-[11px] uppercase tracking-widest">Zu zweit</span>
    </button>
    <button data-filter="group" class="format-filter px-5 py-2.5 rounded-lg border border-outline-variant/30 bg-surface-container-low hover:border-secondary/50 transition-colors flex items-center gap-2">
      <span class="material-symbols-outlined text-base">groups</span>
      <span class="font-label text-[11px] uppercase tracking-widest">Kleine Gruppe</span>
    </button>
  </section>

  <!-- Featured (dynamisch eingefügt) -->
  <div id="featuredGrid" class="mb-12"></div>

  <!-- Rest der Themen -->
  <div id="themesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 md:gap-12"></div>
</main>

    <p class="font-['Inter'] text-xs tracking-wider uppercase text-on-surface-variant/50 mt-2">© 2026 KlarKreis</p>
  </div>
  <div class="flex flex-wrap justify-center gap-8">
    <a class="font-['Inter'] text-xs tracking-wider uppercase text-on-surface-variant/50 hover:text-secondary transition-colors" href="ueber.html">Über</a>
    <a class="font-['Inter'] text-xs tracking-wider uppercase text-on-surface-variant/50 hover:text-secondary transition-colors" href="gastgeber.html">Gastgeber</a>

  </div>
</footer>

<script src="themes.js"></script>
<script>
// Restore previous filter from URL or session
const params = new URLSearchParams(location.search);
let currentFilter = params.get('format') || 'all';

function formatBadge(fKey, fObj, isPreferred) {
  const iconMap = { group: 'groups', pair: 'handshake' };
  const cls = isPreferred
    ? 'bg-secondary text-on-primary'
    : 'bg-surface-container-highest text-on-surface-variant';
  return `<span class="inline-flex items-center gap-1 px-2 py-1 rounded text-[9px] uppercase tracking-widest font-semibold ${cls}">
    <span class="material-symbols-outlined text-[12px]">${iconMap[fKey] || 'groups'}</span>
    ${fObj.label}
  </span>`;
}

function cardHref(theme) {
  const wantedFormat = (currentFilter !== 'all' && theme.formats[currentFilter]) ? currentFilter : null;
  return wantedFormat ? `thema.html?id=${theme.id}&format=${wantedFormat}` : `thema.html?id=${theme.id}`;
}

function renderFeatured() {
  const featured = Object.values(window.THEMES).find(t => t.featured);
  if (!featured) { document.getElementById('featuredGrid').innerHTML = ''; return; }
  // Only show featured if the active filter matches its formats
  if (currentFilter !== 'all' && !featured.formats[currentFilter]) {
    document.getElementById('featuredGrid').innerHTML = '';
    return;
  }
  const f = currentFilter !== 'all' ? featured.formats[currentFilter] : (featured.formats.group || featured.formats.pair);
  document.getElementById('featuredGrid').innerHTML = `
    <article class="group bg-primary-container p-6 rounded-lg">
      <a href="${cardHref(featured)}" class="block">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
          <div class="relative overflow-hidden aspect-[4/3] bg-surface-container-highest rounded-lg">
            <img class="w-full h-full object-cover grayscale transition-all duration-700 group-hover:grayscale-0 group-hover:scale-105" alt="${featured.title}" src="${featured.image}"/>
            <span class="absolute top-4 left-4 bg-secondary text-on-primary px-3 py-1 text-[9px] uppercase tracking-widest font-semibold">Ausgearbeitet</span>
          </div>
          <div class="flex flex-col justify-center space-y-4 text-on-primary">
            <p class="font-label text-[10px] uppercase tracking-widest text-secondary-fixed-dim">${featured.category}</p>
            <h3 class="font-serif text-3xl md:text-4xl leading-snug">${featured.title}</h3>
            <div class="flex space-x-4 text-[10px] uppercase tracking-widest text-on-primary/60">
              <span class="flex items-center"><span class="material-symbols-outlined text-[14px] mr-1">schedule</span> ${f.duration}</span>
              <span class="flex items-center"><span class="material-symbols-outlined text-[14px] mr-1">groups</span> ${f.people}</span>
            </div>
            <div class="flex flex-wrap gap-2">${Object.keys(featured.formats).map(k => formatBadge(k, featured.formats[k], currentFilter === 'all' || currentFilter === k)).join('')}</div>
            <p class="text-sm text-on-primary/70 leading-relaxed italic font-light">${featured.lead}</p>
            <span class="inline-flex items-center gap-2 text-xs uppercase tracking-widest text-secondary-fixed-dim pt-2">
              Thema öffnen <span class="material-symbols-outlined text-base">arrow_forward</span>
            </span>
          </div>
        </div>
      </a>
    </article>`;
}

function renderGrid() {
  const themes = Object.values(window.THEMES).filter(t => !t.featured);
  const filtered = currentFilter === 'all'
    ? themes
    : themes.filter(t => !!t.formats[currentFilter]);

  const grid = document.getElementById('themesGrid');
  if (!filtered.length) {
    grid.innerHTML = `<p class="col-span-full text-center text-on-surface-variant italic py-12">Kein Thema passt zu diesem Format.</p>`;
    return;
  }
  grid.innerHTML = filtered.map((t, idx) => {
    const offset = idx % 3 === 1 ? 'md:mt-12' : (idx % 3 === 2 ? 'md:-mt-6' : '');
    const firstFormat = currentFilter !== 'all' ? t.formats[currentFilter] : (t.formats.group || t.formats.pair);
    return `
      <article class="group space-y-4 ${offset}">
        <a href="${cardHref(t)}" class="block">
          <div class="relative overflow-hidden aspect-[4/5] bg-surface-container-highest rounded-lg">
            <img class="w-full h-full object-cover grayscale transition-all duration-700 group-hover:grayscale-0 group-hover:scale-105" alt="${t.title}" src="${t.image}"/>
            <div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent"></div>
            <span class="absolute top-4 right-4 bg-surface-bright/90 backdrop-blur px-3 py-1 text-[9px] uppercase tracking-widest font-semibold text-primary">${t.category}</span>
          </div>
        </a>
        <div class="px-1 space-y-2">
          <a href="${cardHref(t)}"><h3 class="font-serif text-2xl text-on-background leading-snug hover:text-secondary transition-colors">${t.title}</h3></a>
          <div class="flex space-x-4 text-[10px] uppercase tracking-widest text-on-surface-variant">
            <span class="flex items-center"><span class="material-symbols-outlined text-[14px] mr-1">schedule</span> ${firstFormat.duration}</span>
            <span class="flex items-center"><span class="material-symbols-outlined text-[14px] mr-1">groups</span> ${firstFormat.people}</span>
          </div>
          <div class="flex flex-wrap gap-2 pt-1">${Object.keys(t.formats).map(k => formatBadge(k, t.formats[k], currentFilter === 'all' || currentFilter === k)).join('')}</div>
          <p class="text-sm text-on-surface-variant leading-relaxed line-clamp-2 italic font-light pt-2">${t.lead}</p>
          <div class="pt-4">
            <a href="${cardHref(t)}" class="block text-center w-full py-3 bg-primary-container text-on-primary text-[10px] uppercase tracking-[0.2em] font-semibold hover:bg-secondary transition-colors duration-300">
              Diesen Abend starten
            </a>
          </div>
        </div>
      </article>`;
  }).join('');
}

function updateFilterButtons() {
  document.querySelectorAll('.format-filter').forEach(btn => {
    const active = btn.dataset.filter === currentFilter;
    btn.classList.toggle('bg-primary-container', active);
    btn.classList.toggle('text-on-primary', active);
    btn.classList.toggle('border-primary-container', active);
    btn.classList.toggle('bg-surface-container-low', !active);
    btn.classList.toggle('border-outline-variant/30', !active);
  });
}

function refresh() {
  updateFilterButtons();
  renderFeatured();
  renderGrid();
}

document.querySelectorAll('.format-filter').forEach(btn => {
  btn.addEventListener('click', () => {
    currentFilter = btn.dataset.filter;
    const url = new URL(location);
    if (currentFilter === 'all') url.searchParams.delete('format');
    else url.searchParams.set('format', currentFilter);
    history.replaceState({}, '', url);
    refresh();
  });
});

refresh();
</script>
</body>
</html>
